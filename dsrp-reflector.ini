# dsrp-reflector sample configuration.
# Load with:  dsrp-reflector -f /etc/dsrp-reflector.ini
# Comments start with '#' or ';'. Command-line flags override these values.

[Network]
# Address to bind. Use 0.0.0.0 for all IPv4 interfaces, :: for all IPv6.
Address=0.0.0.0
# UDP port repeaters connect to. Must match each MMDVMHost's GatewayPort.
Port=20010

[Reflector]
# Callsign reported to repeaters in the link-status reply (max 8 chars).
Callsign=DSRP
# Text shown on the repeater's display / dashboard (max 20 chars).
StatusText=DSRP Reflector
# Reply with a link-status packet so the repeater shows as linked ("being
# heard"). Cosmetic, but recommended. 1/0, on/off, yes/no.
StatusReply=1
# How often to resend that status, in seconds. MMDVMHost logs "link status set
# to ..." on every status packet it receives, so replying to each 60s poll spams
# its log. 0 = reply only when a repeater connects (recommended). Set e.g. 600 if
# you want a restarted repeater to recover its "linked" display within N seconds.
StatusInterval=0

[Timing]
# Drop a repeater after this many seconds with no poll (polls arrive every 60s,
# so ~180 = three missed polls).
ClientTimeout=180
# Release the channel if voice frames stop for this many milliseconds without a
# proper end-of-transmission marker (e.g. a repeater dropped off mid-over).
TalkerTimeout=2000

[Log]
# Verbose / debug logging. Same as the -v flag. 1/0, on/off, yes/no.
Debug=0
